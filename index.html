<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramprakash News</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f4f4;
}

header {
  background:#000;
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
}

.breaking {
  background:red;
  color:white;
  padding:8px;
  font-weight:bold;
  overflow:hidden;
}

.breaking span {
  display:inline-block;
  padding-left:100%;
  animation:scroll 10s linear infinite;
}

@keyframes scroll {
  0% {transform:translateX(0);}
  100% {transform:translateX(-100%);}
}

.container {
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.video {
  text-align:center;
  margin-top:20px;
}

footer {
  background:#000;
  color:#fff;
  text-align:center;
  padding:10px;
}
</style>

</head>

<body>

<header>Ramprakash News</header>

<div class="breaking">
  <span>🔴 Breaking News: Yaha aap apni latest news daal sakte ho...</span>
</div>

<div class="container">

  <div class="card">
    <h2>Latest News</h2>
    <p>Aaj ki badi khabar yaha likho...</p>
  </div>

  <div class="card">
    <h2>Trending Update</h2>
    <p>Yaha trending news explain karo...</p>
  </div>

  <div class="video">
    <h2>My YouTube Video</h2>
    <iframe width="300" height="200" src="https://www.youtube.com/embed/VIDEO_ID" frameborder="0" allowfullscreen></iframe>
  </div>

</div>

<footer>
© 2026 Ramprakash News
</footer>

</body>
</html>
