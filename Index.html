<!DOCTYPE html>

      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    nav {
      background: #e50914;

    nav a {

      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;

      padding: 20px;

    .news-card {

      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .news-card h2 {
      margin: 0 0 10px;

    footer {
      background: #111;

      padding: 10px;

  <div class="news-card">
